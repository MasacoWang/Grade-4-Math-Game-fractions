<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quest - Order of Operations &amp; Fractions</title>
<style>
  :root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --success: #27ae60;
    --danger: #e74c3c;
    --warning: #f39c12;
    --bg: #e8f8ff;
    --card: #ffffff;
    --card-light: #f0f4ff;
    --text: #2d3436;
    --text-muted: #636e72;
    --border-radius: 20px;
    --pink: #fd79a8;
    --yellow: #ffeaa7;
    --green: #55efc4;
    --blue: #74b9ff;
    --orange: #fab1a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 25%, #a1c4fd 50%, #c2e9fb 75%, #d4fc79 100%);
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating background decorations */
  body::before {
    content: '🌟 🎈 🦄 🌈 🎮 ⭐ 🚀 🎯 🍭 🎪 🪁 🎠';
    position: fixed;
    top: 0; left: 0;
    width: 200%;
    font-size: 2rem;
    letter-spacing: 60px;
    line-height: 120px;
    word-spacing: 80px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: floatDecor 60s linear infinite;
    white-space: nowrap;
  }
  @keyframes floatDecor {
    from { transform: translate(0, 0); }
    to   { transform: translate(-50%, 20px); }
  }

  body > * { position: relative; z-index: 1; }

  header {
    text-align: center;
    padding: 30px 20px 10px;
  }

  header h1 {
    font-size: 2.6rem;
    background: linear-gradient(135deg, #6c5ce7, #e84393, #fdcb6e, #00b894);
    background-size: 300% 300%;
    animation: titleGlow 4s ease infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    text-shadow: none;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
  }
  @keyframes titleGlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  header p { color: var(--text-muted); font-size: 1.05rem; font-weight: 500; }

  /* Score bar */
  .score-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 18px 0 10px;
  }
  .score-item {
    background: var(--card);
    padding: 10px 22px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.95rem;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    border: 2px solid var(--card-light);
  }
  .score-item span { color: #6c5ce7; font-weight: 800; }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 14px 0;
    max-width: 700px;
  }
  .mode-btn {
    padding: 10px 18px;
    border: 2px solid #dfe6e9;
    border-radius: 30px;
    background: #fff;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .mode-btn:hover { border-color: var(--primary-light); color: var(--text); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(108,92,231,0.2); }
  .mode-btn.active {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    border-color: #6c5ce7;
    color: #fff;
    box-shadow: 0 4px 15px rgba(108,92,231,0.3);
  }

  /* Difficulty */
  .difficulty-bar {
    display: flex; gap: 10px; justify-content: center; margin: 8px 0 18px;
  }
  .diff-btn {
    padding: 6px 18px;
    border: 2px solid #dfe6e9;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    background: #fff;
    color: var(--text-muted);
    transition: all 0.25s;
  }
  .diff-btn:hover { color: var(--text); transform: translateY(-1px); }
  .diff-btn.active { background: linear-gradient(135deg, #fdcb6e, #f39c12); color: #fff; border-color: #f39c12; box-shadow: 0 3px 10px rgba(243,156,18,0.3); }

  /* Game card */
  .game-card {
    background: var(--card);
    border-radius: var(--border-radius);
    padding: 36px 32px;
    width: 92%;
    max-width: 620px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(108,92,231,0.12), 0 2px 10px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    border: 2px solid rgba(108,92,231,0.1);
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #6c5ce7, #e84393, #fdcb6e, #00b894, #74b9ff);
    background-size: 200% 100%;
    animation: rainbowBar 3s linear infinite;
  }
  @keyframes rainbowBar {
    from { background-position: 0% 0%; }
    to   { background-position: 200% 0%; }
  }

  .question-label {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
  }

  .hint-text {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-bottom: 12px;
    font-style: italic;
  }

  /* Fraction & question display */
  .question-display {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 80px;
  }

  .mixed-number {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .whole-part { font-size: 1.8rem; }
  .fraction-display {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    font-size: 1.2rem;
    line-height: 1.1;
  }
  .fraction-display .num { border-bottom: 2px solid var(--text); padding-bottom: 2px; min-width: 20px; }
  .fraction-display .den { padding-top: 2px; min-width: 20px; }
  .operator { font-size: 1.8rem; color: #6c5ce7; margin: 0 4px; font-weight: 800; }
  .equals { font-size: 1.8rem; color: #e84393; font-weight: 800; }

  /* ── Visual fraction icons ── */
  .fraction-visual {
    display: none;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin: -8px 0 18px 0;
    animation: fadeIn 0.4s;
  }
  .fraction-visual.show { display: flex; }
  .fv-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .fv-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .fv-items {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    justify-content: center;
    max-width: 180px;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: 6px 10px;
    border: 2px dashed rgba(108,92,231,0.2);
  }
  .fv-item {
    font-size: 1.3rem;
    line-height: 1;
    transition: transform 0.2s;
  }
  .fv-item.filled { animation: popIn 0.3s ease backwards; }
  .fv-item.empty  { filter: grayscale(1) opacity(0.25); }
  .fv-op {
    font-size: 2rem;
    font-weight: 800;
    color: #6c5ce7;
    align-self: center;
  }
  .fv-whole-group {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .fv-whole-circle {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    justify-content: center;
    max-width: 80px;
    background: rgba(85,239,196,0.2);
    border-radius: 10px;
    padding: 4px 6px;
    border: 2px solid rgba(0,184,148,0.3);
  }
  .fv-whole-circle .fv-item { font-size: 1.05rem; }
  .fv-partial {
    display: flex; flex-wrap: wrap; gap: 2px; justify-content: center;
    max-width: 80px;
    background: rgba(253,121,168,0.15);
    border-radius: 10px;
    padding: 4px 6px;
    border: 2px dashed rgba(253,121,168,0.3);
  }
  .fv-partial .fv-item { font-size: 1.05rem; }
  @keyframes popIn {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  /* Answer input */
  .answer-section { margin-bottom: 20px; }

  .answer-simple input {
    width: 160px;
    padding: 12px 16px;
    font-size: 1.4rem;
    text-align: center;
    border: 3px solid #dfe6e9;
    border-radius: 14px;
    background: #fafafa;
    color: var(--text);
    outline: none;
    transition: border 0.25s, box-shadow 0.25s;
  }
  .answer-simple input:focus { border-color: #6c5ce7; box-shadow: 0 0 0 4px rgba(108,92,231,0.15); }

  .answer-fraction {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .answer-fraction .field-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .answer-fraction .field-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .answer-fraction input {
    width: 60px;
    padding: 8px;
    font-size: 1.2rem;
    text-align: center;
    border: 3px solid #dfe6e9;
    border-radius: 12px;
    background: #fafafa;
    color: var(--text);
    outline: none;
    transition: border 0.25s, box-shadow 0.25s;
  }
  .answer-fraction input:focus { border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,0.15); }
  .answer-fraction .frac-sep {
    font-size: 1.6rem;
    color: #b2bec3;
    user-select: none;
    font-weight: 700;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .btn {
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, #00b894, #55efc4);
    color: #fff;
    box-shadow: 0 4px 15px rgba(0,184,148,0.35);
    font-size: 1.05rem;
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(0,184,148,0.5); transform: translateY(-2px); }
  .btn-skip {
    background: #fff;
    color: var(--text-muted);
    border: 2px solid #dfe6e9;
  }
  .btn-skip:hover { color: var(--text); border-color: #b2bec3; }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    display: none;
    animation: fadeIn 0.3s;
  }
  .feedback.correct { display: block; background: rgba(39,174,96,0.12); color: #27ae60; border: 2px solid rgba(39,174,96,0.2); }
  .feedback.wrong   { display: block; background: rgba(231,76,60,0.1); color: #e74c3c; border: 2px solid rgba(231,76,60,0.15); }

  /* Step-by-step explanation box */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #fff9e6, #fff3cd);
    border: 2px solid #f39c12;
    border-radius: 14px;
    text-align: left;
    font-size: 0.92rem;
    color: #2d3436;
    animation: fadeIn 0.3s;
  }
  .explanation.show { display: block; }
  .explanation .exp-title {
    font-weight: 800;
    font-size: 1rem;
    color: #e84393;
    margin-bottom: 10px;
    text-align: center;
  }
  .explanation .exp-step {
    padding: 6px 0;
    border-bottom: 1px dashed #e0d5b7;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .explanation .exp-step:last-child { border-bottom: none; }
  .explanation .step-num {
    background: #6c5ce7;
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .explanation .step-text { line-height: 1.5; }
  .explanation .step-text b { color: #6c5ce7; }
  .explanation .exp-result {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,184,148,0.12);
    border-radius: 10px;
    text-align: center;
    font-weight: 800;
    font-size: 1.1rem;
    color: #27ae60;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* Timer bar — hidden (unlimited time) */
  .timer-bar-container {
    display: none;
  }
  .timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00b894, #fdcb6e, #e84393);
    border-radius: 3px;
    transition: width 0.3s linear;
  }

  /* Next Question button */
  .btn-next {
    display: none;
    margin: 18px auto 0;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: #fff;
    box-shadow: 0 4px 15px rgba(108,92,231,0.35);
    transition: transform 0.15s, box-shadow 0.25s;
    animation: fadeIn 0.4s;
  }
  .btn-next:hover { box-shadow: 0 6px 22px rgba(108,92,231,0.5); transform: translateY(-2px); }
  .btn-next:active { transform: scale(0.96); }
  .btn-next.show { display: block; }

  /* Streak */
  .streak-display {
    margin-top: 16px;
    font-size: 0.95rem;
    color: var(--text-muted);
    font-weight: 600;
  }
  .streak-display .fire { color: #e84393; }

  /* Keypad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 16px auto 0;
    max-width: 300px;
  }
  .numpad button {
    padding: 14px;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid #dfe6e9;
    border-radius: 12px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .numpad button:hover { background: #f0f4ff; transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
  .numpad button:active { transform: scale(0.94); }
  .numpad .key-action { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; border-color: #6c5ce7; }
  .numpad .key-action:hover { background: linear-gradient(135deg, #5a4bd1, #8f86f7); }
  .numpad .key-danger { background: linear-gradient(135deg, #e84393, #fd79a8); color: #fff; border-color: #e84393; }
  .numpad .key-danger:hover { background: linear-gradient(135deg, #d63384, #f06292); }

  footer {
    margin-top: auto;
    padding: 20px;
    color: #b2bec3;
    font-size: 0.8rem;
  }

  /* ═══════ REWARD ANIMATION SYSTEM ═══════ */

  /* Fullscreen overlay for big celebrations */
  .reward-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  /* Floating coin / star particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 10000;
    font-size: 1.8rem;
    animation: particleFloat 1.2s ease-out forwards;
  }
  @keyframes particleFloat {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    50%  { opacity: 1; transform: translateY(-60px) scale(1.3) rotate(180deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5) rotate(360deg); }
  }

  /* Running character scene */
  .runner-scene {
    position: fixed;
    bottom: 0;
    left: -120px;
    z-index: 10001;
    pointer-events: none;
    animation: runAcross 2s ease-in-out forwards;
  }
  @keyframes runAcross {
    0%   { left: -120px; bottom: 0; }
    30%  { bottom: 40px; }
    50%  { bottom: 0; }
    70%  { bottom: 30px; }
    100% { left: 110vw; bottom: 0; }
  }

  .runner-character {
    font-size: 3.5rem;
    animation: runBounce 0.3s ease-in-out infinite alternate;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }
  @keyframes runBounce {
    from { transform: translateY(0) scaleX(1); }
    to   { transform: translateY(-12px) scaleX(1); }
  }

  /* Power-up mushroom / star popup */
  .powerup-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 10002;
    pointer-events: none;
    text-align: center;
    animation: powerupPop 1.6s ease-out forwards;
  }
  @keyframes powerupPop {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
    20%  { transform: translate(-50%, -50%) scale(1.4) rotate(5deg); opacity: 1; }
    40%  { transform: translate(-50%, -50%) scale(1.1) rotate(-3deg); opacity: 1; }
    70%  { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -70%) scale(0.8) rotate(0deg); opacity: 0; }
  }
  .powerup-emoji {
    font-size: 5rem;
    display: block;
    filter: drop-shadow(0 0 20px rgba(253,203,110,0.8));
  }
  .powerup-text {
    font-size: 1.8rem;
    font-weight: 900;
    color: #e84393;
    text-shadow: 0 0 20px rgba(232,67,147,0.5), 2px 2px 0 rgba(0,0,0,0.1);
    margin-top: 8px;
  }

  /* Coin counter pop */
  .coin-burst {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10002;
    pointer-events: none;
    font-size: 2rem;
    font-weight: 900;
    color: #f39c12;
    text-shadow: 0 0 15px rgba(243,156,18,0.5);
    animation: coinBurstAnim 1s ease-out forwards;
  }
  @keyframes coinBurstAnim {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
    30%  { opacity: 1; transform: translateX(-50%) scale(1.3); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-60px) scale(1); }
  }

  /* Screen flash for big streaks */
  .screen-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9998;
    pointer-events: none;
    animation: flashAnim 0.4s ease-out forwards;
  }
  @keyframes flashAnim {
    0%   { background: rgba(253,203,110,0.3); }
    100% { background: transparent; }
  }

  /* Firework canvas */
  #firework-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    pointer-events: none;
  }

  /* Milestone banner */
  .milestone-banner {
    position: fixed;
    top: 15%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    z-index: 10003;
    pointer-events: none;
    background: linear-gradient(135deg, #6c5ce7, #fd79a8);
    padding: 20px 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(108,92,231,0.6);
    animation: bannerPop 2.5s ease-out forwards;
  }
  @keyframes bannerPop {
    0%   { transform: translateX(-50%) scale(0) rotate(-5deg); opacity: 0; }
    15%  { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; }
    25%  { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    75%  { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateX(-50%) scale(0.8) translateY(-30px); opacity: 0; }
  }
  .milestone-banner .milestone-icon { font-size: 3rem; }
  .milestone-banner .milestone-title {
    font-size: 1.5rem;
    font-weight: 900;
    color: #fff;
    margin-top: 6px;
  }
  .milestone-banner .milestone-sub {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .game-card { padding: 24px 16px; }
    .question-display { font-size: 1.2rem; gap: 8px; }
    .whole-part { font-size: 1.4rem; }
    .fraction-display { font-size: 1rem; }
    .operator, .equals { font-size: 1.4rem; }
    .mode-btn { padding: 8px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🧮 Math Quest</h1>
  <p>Order of Operations, Fractions &amp; More!</p>
</header>

<div class="score-bar">
  <div class="score-item">✅ Correct: <span id="correct-count">0</span></div>

<script>
// ──── State ────
let mode = 'order-of-ops';
let difficulty = 'easy';
let correct = 0, wrong = 0, score = 0, streak = 0;
let currentAnswer = null;
let currentQuestionData = null; // stores question details for explanations
let answerType = 'simple'; // 'simple' | 'fraction' | 'mixed'
let timerInterval = null;
let timeLeft = 0;
let focusedInput = null;

// ──── Difficulty ranges ────
const ranges = {
  easy:   { max: 12, fracMax: 3,  denomMax: 6,  time: 40 },
  medium: { max: 20, fracMax: 8,  denomMax: 12, time: 30 },
  hard:   { max: 50, fracMax: 15, denomMax: 20, time: 20 },
};

// ──── DOM refs ────
const $question   = document.getElementById('question-display');
const $label      = document.getElementById('question-label');
const $hint       = document.getElementById('hint-text');
const $answer     = document.getElementById('answer-section');
const $feedback   = document.getElementById('feedback');
const $correct    = document.getElementById('correct-count');
const $wrong      = document.getElementById('wrong-count');
const $score      = document.getElementById('score');
const $streak     = document.getElementById('streak-display');
const $timerBar   = document.getElementById('timer-bar');
const $numpad     = document.getElementById('numpad');
const $explanation = document.getElementById('explanation');
const $fracVisual = document.getElementById('fraction-visual');
const $btnNext    = document.getElementById('btn-next');

// ── Food icons for visual fraction display ──
const foodIcons = ['🍕','🎂','🍬','🧁','🍩','🍪','🍦','🧃','🍰','🍫','🧇','🍭'];
let currentFoodIcon = '🍕';
function pickFoodIcon() { currentFoodIcon = foodIcons[rand(0, foodIcons.length - 1)]; }

function renderFractionVisual(frac1, frac2, symbol, isMixed) {
  pickFoodIcon();
  let html = '';

  if (isMixed) {
    // Mixed number 1: whole circles + partial
    html += renderMixedVisual(frac1, 'First');
    html += `<span class="fv-op">${symbol}</span>`;
    html += renderMixedVisual(frac2, 'Second');
  } else {
    // Simple / improper fraction
    html += renderSimpleFracVisual(frac1.num, frac1.den, 'First');
    html += `<span class="fv-op">${symbol}</span>`;
    html += renderSimpleFracVisual(frac2.num, frac2.den, 'Second');
  }

  $fracVisual.innerHTML = html;
  $fracVisual.className = 'fraction-visual show';
}

function renderSimpleFracVisual(num, den, label) {
  // For improper fractions, show full groups + remainder
  const wholes = Math.floor(num / den);
  const partNum = num % den;
  let inner = '';

  if (wholes > 0 && wholes <= 4) {
    for (let w = 0; w < wholes; w++) {
      inner += '<div class="fv-whole-circle">';
      for (let i = 0; i < den && i < 8; i++) {
        inner += `<span class="fv-item filled" style="animation-delay:${(w*den+i)*0.04}s">${currentFoodIcon}</span>`;
      }
      inner += '</div>';
    }
  } else if (wholes > 4) {
    inner += `<div class="fv-whole-circle"><span class="fv-item filled">${currentFoodIcon}</span><span style="font-size:0.8rem;color:var(--text-muted)">×${wholes*den}</span></div>`;
  }

  if (partNum > 0 || wholes === 0) {
    inner += '<div class="fv-partial">';
    const showDen = Math.min(den, 8);
    const showNum = Math.min(partNum, showDen);
    for (let i = 0; i < showDen; i++) {
      const cls = i < showNum ? 'filled' : 'empty';
      const delay = (wholes * den + i) * 0.04;
      inner += `<span class="fv-item ${cls}" style="animation-delay:${delay}s">${currentFoodIcon}</span>`;
    }
    inner += '</div>';
  }

  return `<div class="fv-group"><div class="fv-whole-group">${inner}</div><div class="fv-label">${num}/${den}</div></div>`;
}

function renderMixedVisual(m, label) {
  let inner = '';
  const showWholes = Math.min(m.whole, 4);

  for (let w = 0; w < showWholes; w++) {
    inner += '<div class="fv-whole-circle">';
    const showDen = Math.min(m.den, 6);
    for (let i = 0; i < showDen; i++) {
      inner += `<span class="fv-item filled" style="animation-delay:${(w*m.den+i)*0.04}s">${currentFoodIcon}</span>`;
    }
    inner += '</div>';
  }
  if (m.whole > 4) {
    inner += `<span style="font-size:0.9rem;color:var(--text-muted);align-self:center">…+${m.whole - 4} more</span>`;
  }

  if (m.num > 0) {
    inner += '<div class="fv-partial">';
    const showDen = Math.min(m.den, 6);
    const showNum = Math.min(m.num, showDen);
    for (let i = 0; i < showDen; i++) {
      const cls = i < showNum ? 'filled' : 'empty';
      const delay = (showWholes * m.den + i) * 0.04;
      inner += `<span class="fv-item ${cls}" style="animation-delay:${delay}s">${currentFoodIcon}</span>`;
    }
    inner += '</div>';
  }

  let lbl = m.whole > 0 ? m.whole : '';
  if (m.num > 0) lbl += (m.whole > 0 ? ' ' : '') + m.num + '/' + m.den;
  if (!lbl) lbl = '0';

  return `<div class="fv-group"><div class="fv-whole-group">${inner}</div><div class="fv-label">${lbl}</div></div>`;
}

function hideFractionVisual() {
  $fracVisual.className = 'fraction-visual';
  $fracVisual.innerHTML = '';
}

// ──── Mode & Difficulty buttons ────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    newQuestion();
  });
});
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    newQuestion();
  });
});

// ──── Helpers ────
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function simplifyFrac(num, den) {
  if (den === 0) return { num: 0, den: 1 };
  if (num === 0) return { num: 0, den: 1 };
  const g = gcd(num, den);
  let sn = num / g, sd = den / g;
  if (sd < 0) { sn = -sn; sd = -sd; }
  return { num: sn, den: sd };
}

function toMixed(num, den) {
  const s = simplifyFrac(num, den);
  const n = s.num, d = s.den;
  const whole = Math.trunc(n / d);
  const rem = Math.abs(n % d);
  return { whole, num: rem, den: d };
}

function fracToDecimal(num, den) {
  return den === 0 ? 0 : num / den;
}

// ──── HTML Rendering ────
function renderFraction(num, den) {
  return `<span class="fraction-display"><span class="num">${num}</span><span class="den">${den}</span></span>`;
}

function renderMixed(whole, num, den) {
  let html = '<span class="mixed-number">';
  if (whole !== 0) html += `<span class="whole-part">${whole}</span>`;
  if (num !== 0) html += renderFraction(num, den);
  if (whole === 0 && num === 0) html += '<span class="whole-part">0</span>';
  html += '</span>';
  return html;
}

function renderImproper(num, den) {
  if (den === 1) return `<span class="whole-part">${num}</span>`;
  return renderFraction(num, den);
}

function renderNumber(n) {
  return `<span class="whole-part">${n}</span>`;
}

function formatFracAnswer(num, den) {
  if (den === 1) return `${num}`;
  return `${num}/${den}`;
}

function formatMixedAnswer(whole, num, den) {
  let s = '';
  if (whole !== 0) s += whole;
  if (num !== 0) s += (whole !== 0 ? ' ' : '') + num + '/' + den;
  if (whole === 0 && num === 0) s = '0';
  return s;
}

// ═══════════════════════════════════════════
// ORDER OF OPERATIONS GENERATOR
// ═══════════════════════════════════════════
function generateOrderOfOps() {
  const r = ranges[difficulty];

  if (difficulty === 'easy') {
    // 3 terms: a ○ b ○ c where one op is ×/÷ and one is +/−
    return genOOO_3terms(r);
  } else if (difficulty === 'medium') {
    // 4 terms
    return genOOO_4terms(r);
  } else {
    // 4-5 terms, may include parentheses
    return rand(0,1) ? genOOO_parentheses(r) : genOOO_4terms(r);
  }
}

function genOOO_3terms(r) {
  const a = rand(1, r.max);
  const b = rand(1, r.max);
  const c = rand(1, r.max);

  // Patterns that test order of operations
  const patterns = [
    // a + b × c
    () => {
      const expr = `${a} + ${b} × ${c}`;
      const ans = a + b * c;
      return { expr, ans };
    },
    // a − b × c (ensure positive)
    () => {
      const prod = b * c;
      const safeA = rand(prod + 1, prod + r.max);
      const expr = `${safeA} − ${b} × ${c}`;
      const ans = safeA - b * c;
      return { expr, ans };
    },
    // a × b + c
    () => {
      const expr = `${a} × ${b} + ${c}`;
      const ans = a * b + c;
      return { expr, ans };
    },
    // a × b − c (ensure positive)
    () => {
      const prod = a * b;
      const safeC = rand(1, Math.max(1, prod - 1));
      const expr = `${a} × ${b} − ${safeC}`;
      const ans = a * b - safeC;
      return { expr, ans };
    },
    // a + b ÷ c (clean division)
    () => {
      const divisor = rand(1, Math.min(r.max, 12));
      const quotient = rand(1, r.max);
      const dividend = divisor * quotient;
      const expr = `${a} + ${dividend} ÷ ${divisor}`;
      const ans = a + quotient;
      return { expr, ans };
    },
    // a ÷ b + c (clean division)
    () => {
      const divisor = rand(1, Math.min(r.max, 12));
      const quotient = rand(1, r.max);
      const dividend = divisor * quotient;
      const expr = `${dividend} ÷ ${divisor} + ${c}`;
      const ans = quotient + c;
      return { expr, ans };
    },
  ];

  return patterns[rand(0, patterns.length - 1)]();
}

function genOOO_4terms(r) {
  // a ○ b ○ c ○ d with mix of operations
  const patterns = [
    // a + b × c − d
    () => {
      const a = rand(1, r.max), b = rand(1, Math.min(r.max, 10)), c = rand(1, Math.min(r.max, 10)), d = rand(1, r.max);
      const ans = a + b * c - d;
      if (ans < 0) return genOOO_4terms(r);
      return { expr: `${a} + ${b} × ${c} − ${d}`, ans };
    },
    // a × b + c × d
    () => {
      const a = rand(1, Math.min(r.max, 10)), b = rand(1, Math.min(r.max, 10));
      const c = rand(1, Math.min(r.max, 10)), d = rand(1, Math.min(r.max, 10));
      return { expr: `${a} × ${b} + ${c} × ${d}`, ans: a * b + c * d };
    },
    // a × b − c ÷ d
    () => {
      const a = rand(1, Math.min(r.max, 10)), b = rand(1, Math.min(r.max, 10));
      const d = rand(1, Math.min(r.max, 10));
      const quotient = rand(1, r.max);
      const c = d * quotient;
      const ans = a * b - quotient;
      if (ans < 0) return genOOO_4terms(r);
      return { expr: `${a} × ${b} − ${c} ÷ ${d}`, ans };
    },
    // a + b × c + d
    () => {
      const a = rand(1, r.max), b = rand(1, Math.min(r.max, 10)), c = rand(1, Math.min(r.max, 10)), d = rand(1, r.max);
      return { expr: `${a} + ${b} × ${c} + ${d}`, ans: a + b * c + d };
    },
    // a ÷ b + c × d
    () => {
      const b = rand(1, Math.min(r.max, 10));
      const q = rand(1, r.max);
      const a = b * q;
      const c = rand(1, Math.min(r.max, 10)), d = rand(1, Math.min(r.max, 10));
      return { expr: `${a} ÷ ${b} + ${c} × ${d}`, ans: q + c * d };
    },
  ];

  return patterns[rand(0, patterns.length - 1)]();
}

function genOOO_parentheses(r) {
  const patterns = [
    // (a + b) × c
    () => {
      const a = rand(1, r.max), b = rand(1, r.max), c = rand(1, Math.min(r.max, 10));
      return { expr: `( ${a} + ${b} ) × ${c}`, ans: (a + b) * c };
    },
    // a × (b + c)
    () => {
      const a = rand(1, Math.min(r.max, 10)), b = rand(1, r.max), c = rand(1, r.max);
      return { expr: `${a} × ( ${b} + ${c} )`, ans: a * (b + c) };
    },
    // (a − b) × c + d
    () => {
      const a = rand(2, r.max), b = rand(1, a - 1), c = rand(1, Math.min(r.max, 10)), d = rand(1, r.max);
      return { expr: `( ${a} − ${b} ) × ${c} + ${d}`, ans: (a - b) * c + d };
    },
    // a × (b − c) + d
    () => {
      const a = rand(1, Math.min(r.max, 10)), b = rand(2, r.max), c = rand(1, b - 1), d = rand(1, r.max);
      return { expr: `${a} × ( ${b} − ${c} ) + ${d}`, ans: a * (b - c) + d };
    },
    // (a + b) × (c − d)
    () => {
      const a = rand(1, r.max), b = rand(1, r.max), c = rand(2, r.max), d = rand(1, c - 1);
      return { expr: `( ${a} + ${b} ) × ( ${c} − ${d} )`, ans: (a + b) * (c - d) };
    },
    // a + (b + c) × d
    () => {
      const a = rand(1, r.max), b = rand(1, r.max), c = rand(1, r.max), d = rand(1, Math.min(r.max, 10));
      return { expr: `${a} + ( ${b} + ${c} ) × ${d}`, ans: a + (b + c) * d };
    },
  ];

  return patterns[rand(0, patterns.length - 1)]();
}

// ═══════════════════════════════════════════
// FRACTION GENERATORS
// ═══════════════════════════════════════════
const opSymbols = ['+', '−', '×', '÷'];

function generateProperFraction() {
  const r = ranges[difficulty];
  const symbol = opSymbols[rand(0, 3)];

  // Proper: numerator < denominator
  const d1 = rand(2, r.denomMax), n1 = rand(1, d1 - 1);
  const d2 = rand(2, r.denomMax), n2 = rand(1, d2 - 1);

  let resNum, resDen;
  switch (symbol) {
    case '+': resNum = n1 * d2 + n2 * d1; resDen = d1 * d2; break;
    case '−': resNum = n1 * d2 - n2 * d1; resDen = d1 * d2; break;
    case '×': resNum = n1 * n2; resDen = d1 * d2; break;
    case '÷':
      if (n2 === 0) return generateProperFraction();
      resNum = n1 * d2; resDen = d1 * n2; break;
  }

  if (resDen === 0 || resNum < 0) return generateProperFraction();

  const simplified = simplifyFrac(resNum, resDen);

  return {
    frac1: simplifyFrac(n1, d1),
    frac2: simplifyFrac(n2, d2),
    symbol,
    result: simplified,
    resultMixed: toMixed(resNum, resDen),
  };
}

function generateImproperFraction() {
  const r = ranges[difficulty];
  const symbol = opSymbols[rand(0, 3)];

  // Improper: numerator >= denominator
  const d1 = rand(2, r.denomMax), n1 = rand(d1, d1 + r.fracMax);
  const d2 = rand(2, r.denomMax), n2 = rand(d2, d2 + r.fracMax);

  let resNum, resDen;
  switch (symbol) {
    case '+': resNum = n1 * d2 + n2 * d1; resDen = d1 * d2; break;
    case '−': resNum = n1 * d2 - n2 * d1; resDen = d1 * d2; break;
    case '×': resNum = n1 * n2; resDen = d1 * d2; break;
    case '÷':
      if (n2 === 0) return generateImproperFraction();
      resNum = n1 * d2; resDen = d1 * n2; break;
  }

  if (resDen === 0 || resNum < 0) return generateImproperFraction();

  const simplified = simplifyFrac(resNum, resDen);

  return {
    frac1: simplifyFrac(n1, d1),
    frac2: simplifyFrac(n2, d2),
    symbol,
    result: simplified,
    resultMixed: toMixed(resNum, resDen),
  };
}

function generateMixedNumber() {
  const r = ranges[difficulty];
  const symbol = opSymbols[rand(0, 3)];

  const w1 = rand(1, r.fracMax), n1 = rand(1, r.denomMax - 1), d1 = rand(2, r.denomMax);
  const w2 = rand(1, r.fracMax), n2 = rand(1, r.denomMax - 1), d2 = rand(2, r.denomMax);

  const imp1 = w1 * d1 + n1;
  const imp2 = w2 * d2 + n2;

  let resNum, resDen;
  switch (symbol) {
    case '+': resNum = imp1 * d2 + imp2 * d1; resDen = d1 * d2; break;
    case '−': resNum = imp1 * d2 - imp2 * d1; resDen = d1 * d2; break;
    case '×': resNum = imp1 * imp2; resDen = d1 * d2; break;
    case '÷':
      if (imp2 === 0) return generateMixedNumber();
      resNum = imp1 * d2; resDen = d1 * imp2; break;
  }

  if (resDen === 0 || resNum < 0) return generateMixedNumber();

  const result = toMixed(resNum, resDen);
  const m1 = { whole: w1, ...simplifyFrac(n1, d1) };
  const m2 = { whole: w2, ...simplifyFrac(n2, d2) };

  return { mixed1: m1, mixed2: m2, symbol, result };
}

// ═══════════════════════════════════════════
// QUESTION DISPLAY & ANSWER CHECKING
// ═══════════════════════════════════════════
function pickMode() {
  if (mode === 'random') {
    const modes = ['order-of-ops', 'proper', 'improper', 'mixed'];
    return modes[rand(0, modes.length - 1)];
  }
  return mode;
}

function newQuestion() {
  clearInterval(timerInterval);
  $feedback.className = 'feedback';
  $feedback.style.display = 'none';
  $explanation.className = 'explanation';
  $explanation.innerHTML = '';
  $btnNext.className = 'btn-next';

  const currentMode = pickMode();

  switch (currentMode) {
    case 'order-of-ops': setupOrderOfOps(); break;
    case 'proper':       setupProperFraction(); break;
    case 'improper':     setupImproperFraction(); break;
    case 'mixed':        setupMixedNumber(); break;
  }

  buildNumpad();
}

// ── Order of Operations ──
function setupOrderOfOps() {
  const q = generateOrderOfOps();
  answerType = 'simple';
  currentAnswer = q.ans;
  currentQuestionData = { type: 'order-of-ops', expr: q.expr, ans: q.ans };

  $label.textContent = 'Order of Operations';
  $hint.textContent = 'Remember: × and ÷ before + and −';

  // Render expression with styled operators
  const exprHtml = q.expr
    .replace(/×/g, '<span class="operator">×</span>')
    .replace(/÷/g, '<span class="operator">÷</span>')
    .replace(/\+/g, '<span class="operator">+</span>')
    .replace(/−/g, '<span class="operator">−</span>')
    .replace(/\(/g, '<span class="operator" style="color:var(--warning)">(</span>')
    .replace(/\)/g, '<span class="operator" style="color:var(--warning)">)</span>');

  $question.innerHTML = exprHtml + ' <span class="equals">=</span> <span class="whole-part">?</span>';
  hideFractionVisual();
  setupSimpleInput();
}

// ── Proper Fractions ──
function setupProperFraction() {
  const q = generateProperFraction();
  answerType = 'fraction';
  currentAnswer = q.result;
  currentQuestionData = { type: 'proper', frac1: q.frac1, frac2: q.frac2, symbol: q.symbol, result: q.result };

  $label.textContent = 'Proper Fractions';
  $hint.textContent = 'Answer as a simplified fraction (numerator < denominator)';

  $question.innerHTML =
    renderFraction(q.frac1.num, q.frac1.den) +
    `<span class="operator">${q.symbol}</span>` +
    renderFraction(q.frac2.num, q.frac2.den) +
    ' <span class="equals">=</span> <span class="whole-part">?</span>';

  renderFractionVisual(q.frac1, q.frac2, q.symbol, false);
  setupFractionInput(false);
}

// ── Improper Fractions ──
function setupImproperFraction() {
  const q = generateImproperFraction();
  answerType = 'fraction';
  currentAnswer = q.result;
  currentQuestionData = { type: 'improper', frac1: q.frac1, frac2: q.frac2, symbol: q.symbol, result: q.result };

  $label.textContent = 'Improper Fractions';
  $hint.textContent = 'Answer as a simplified fraction (numerator ≥ denominator is OK)';

  $question.innerHTML =
    renderImproper(q.frac1.num, q.frac1.den) +
    `<span class="operator">${q.symbol}</span>` +
    renderImproper(q.frac2.num, q.frac2.den) +
    ' <span class="equals">=</span> <span class="whole-part">?</span>';

  renderFractionVisual(q.frac1, q.frac2, q.symbol, false);
  setupFractionInput(false);
}

// ── Mixed Numbers ──
function setupMixedNumber() {
  const q = generateMixedNumber();
  answerType = 'mixed';
  currentAnswer = q.result;
  currentQuestionData = { type: 'mixed', mixed1: q.mixed1, mixed2: q.mixed2, symbol: q.symbol, result: q.result };

  $label.textContent = 'Mixed Numbers';
  $hint.textContent = 'Answer as a simplified mixed number';

  $question.innerHTML =
    renderMixed(q.mixed1.whole, q.mixed1.num, q.mixed1.den) +
    `<span class="operator">${q.symbol}</span>` +
    renderMixed(q.mixed2.whole, q.mixed2.num, q.mixed2.den) +
    ' <span class="equals">=</span> <span class="whole-part">?</span>';

  renderFractionVisual(q.mixed1, q.mixed2, q.symbol, true);
  setupFractionInput(true);
}

// ── Input setup helpers ──
function setupSimpleInput() {
  $answer.innerHTML = '<div class="answer-simple"><input type="number" id="ans-simple" placeholder="?" autofocus></div>';
  const inp = document.getElementById('ans-simple');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
  inp.addEventListener('focus', () => { focusedInput = inp; });
  focusedInput = inp;
  inp.focus();
}

function setupFractionInput(includeMixed) {
  let html = '<div class="answer-fraction">';
  if (includeMixed) {
    html += `
      <div class="field-group">
        <span class="field-label">Whole</span>
        <input type="number" id="ans-whole" placeholder="W">
      </div>`;
  }
  html += `
    <div class="field-group">
      <span class="field-label">Num</span>
      <input type="number" id="ans-num" placeholder="N">
    </div>
    <span class="frac-sep">/</span>
    <div class="field-group">
      <span class="field-label">Den</span>
      <input type="number" id="ans-den" placeholder="D">
    </div>
  </div>`;
  $answer.innerHTML = html;

  document.querySelectorAll('.answer-fraction input').forEach(inp => {
    inp.addEventListener('focus', () => { focusedInput = inp; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
  });

  const firstInput = document.getElementById(includeMixed ? 'ans-whole' : 'ans-num');
  focusedInput = firstInput;
  firstInput.focus();
}

// ── Check Answer ──
function checkAnswer() {
  clearInterval(timerInterval);

  if (answerType === 'simple') {
    const userAns = parseFloat(document.getElementById('ans-simple').value);
    if (isNaN(userAns)) return showFeedback(false, 'Please enter a number!');
    if (userAns === currentAnswer) {
      handleCorrect();
    } else {
      handleWrong(currentAnswer);
    }
  } else if (answerType === 'fraction') {
    const n = parseInt(document.getElementById('ans-num').value);
    const d = parseInt(document.getElementById('ans-den').value);
    if (isNaN(n) || isNaN(d) || d === 0) return showFeedback(false, 'Enter a valid fraction (denominator ≠ 0)');

    const userSimp = simplifyFrac(n, d);
    const ansSimp = simplifyFrac(currentAnswer.num, currentAnswer.den);

    if (userSimp.num === ansSimp.num && userSimp.den === ansSimp.den) {
      handleCorrect();
    } else {
      handleWrong(formatFracAnswer(ansSimp.num, ansSimp.den));
    }
  } else if (answerType === 'mixed') {
    const w = parseInt(document.getElementById('ans-whole').value) || 0;
    const n = parseInt(document.getElementById('ans-num').value) || 0;
    const d = parseInt(document.getElementById('ans-den').value) || 1;

    if (d === 0) return showFeedback(false, 'Denominator cannot be zero!');

    const userImp = w * d + n;
    const userSimp = simplifyFrac(userImp, d);
    const ansImp = currentAnswer.whole * currentAnswer.den + currentAnswer.num;
    const ansSimp = simplifyFrac(ansImp, currentAnswer.den);

    if (userSimp.num === ansSimp.num && userSimp.den === ansSimp.den) {
      handleCorrect();
    } else {
      handleWrong(formatMixedAnswer(currentAnswer.whole, currentAnswer.num, currentAnswer.den));
    }
  }
}

function handleCorrect() {
  correct++; streak++;
  const bonus = streak >= 5 ? 15 : streak >= 3 ? 10 : 5;
  score += bonus;
  updateScoreboard();
  showFeedback(true, `Correct! +${bonus} points` + (streak >= 3 ? ` (${streak} streak!)` : ''));

  // ── Reward animations ──
  spawnParticles();
  showCoinBurst(bonus);

  if (streak === 3) {
    playRunnerAnimation('🏃');
    showPowerUp('🍄', 'POWER UP!');
    screenFlash();
  } else if (streak === 5) {
    playRunnerAnimation('🦸');
    showPowerUp('⭐', 'SUPER STAR!');
    launchFireworks();
    screenFlash();
  } else if (streak === 10) {
    playRunnerAnimation('🤖');
    showPowerUp('🏆', 'UNSTOPPABLE!');
    launchFireworks();
    showMilestone('🏆', 'LEGENDARY!', '10 in a row — you are a math hero!');
    screenFlash();
  } else if (streak > 0 && streak % 5 === 0 && streak > 10) {
    playRunnerAnimation('🚀');
    showPowerUp('💎', `${streak} STREAK!`);
    launchFireworks();
    screenFlash();
  }

  // Milestone checks on total correct
  if (correct === 10) showMilestone('🎖️', '10 Correct!', 'You earned a Bronze Medal!');
  else if (correct === 25) showMilestone('🥈', '25 Correct!', 'Silver Medal unlocked!');
  else if (correct === 50) showMilestone('🥇', '50 Correct!', 'Gold Medal — amazing!');
  else if (correct === 100) showMilestone('👑', '100 Correct!', 'You are the Math Champion!');

  $btnNext.className = 'btn-next show';
}

function spawnParticles() {
  const emojis = ['⭐','🪙','✨','💫','🌟','🎯','💥','🔥'];
  const count = Math.min(6 + streak, 15);
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[rand(0, emojis.length - 1)];
      el.style.left = (30 + Math.random() * 40) + 'vw';
      el.style.top = (40 + Math.random() * 20) + 'vh';
      el.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
      el.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 60);
  }
}

function showCoinBurst(points) {

}

// ── Fireworks on canvas ──
const fwCanvas = document.getElementById('firework-canvas');
const fwCtx = fwCanvas.getContext('2d');
let fwParticles = [];
let fwAnimating = false;

function resizeFwCanvas() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeFwCanvas);
resizeFwCanvas();

function launchFireworks() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6','#a29bfe','#fd79a8','#fdcb6e'];
  const bursts = rand(3, 5);

  for (let b = 0; b < bursts; b++) {
    setTimeout(() => {
      const cx = rand(fwCanvas.width * 0.15, fwCanvas.width * 0.85);
      const cy = rand(fwCanvas.height * 0.1, fwCanvas.height * 0.5);
      const count = rand(30, 50);
      const color = colors[rand(0, colors.length - 1)];

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
        const speed = 2 + Math.random() * 4;
        fwParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.015 + Math.random() * 0.015,
          color,
          size: 2 + Math.random() * 2,
        });
      }
    }, b * 300);
  }

  if (!fwAnimating) {
    fwAnimating = true;
    animateFireworks();
  }
}

function animateFireworks() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

  for (let i = fwParticles.length - 1; i >= 0; i--) {
    const p = fwParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04; // gravity
    p.vx *= 0.99;
    p.life -= p.decay;

    if (p.life <= 0) {
      fwParticles.splice(i, 1);
      continue;
    }

    fwCtx.globalAlpha = p.life;
    fwCtx.fillStyle = p.color;
    fwCtx.shadowBlur = 8;
    fwCtx.shadowColor = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    fwCtx.fill();
  }

  fwCtx.globalAlpha = 1;
  fwCtx.shadowBlur = 0;

  if (fwParticles.length > 0) {
    requestAnimationFrame(animateFireworks);
  } else {
    fwAnimating = false;
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  }
}

function handleWrong(correctAnswer) {
  wrong++; streak = 0;
  score = Math.max(0, score - 2);
  updateScoreboard();
  showFeedback(false, `Wrong! The answer is ${correctAnswer}`);
  showExplanation();
  $btnNext.className = 'btn-next show';
}

function skipQuestion() {
  clearInterval(timerInterval);
  streak = 0;
  updateScoreboard();
  newQuestion();
}

function showFeedback(isCorrect, msg) {
  $feedback.textContent = (isCorrect ? '🎉 ' : '😕 ') + msg;
  $feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  $feedback.style.display = 'block';
}

// ═══════════════════════════════════════════
// STEP-BY-STEP EXPLANATION SYSTEM
// ═══════════════════════════════════════════
function showExplanation() {
  if (!currentQuestionData) return;
  const q = currentQuestionData;
  let steps = [];

  switch (q.type) {
    case 'order-of-ops':
      steps = explainOrderOfOps(q.expr, q.ans);
      break;
    case 'proper':
    case 'improper':
      steps = explainFractionOp(q.frac1, q.frac2, q.symbol, q.result);
      break;
    case 'mixed':
      steps = explainMixedOp(q.mixed1, q.mixed2, q.symbol, q.result);
      break;
  }

  if (steps.length === 0) return;

  let html = '<div class="exp-title">📝 Here\'s how to solve it:</div>';
  steps.forEach((step, i) => {
    html += `<div class="exp-step">
      <span class="step-num">${i + 1}</span>
      <span class="step-text">${step}</span>
    </div>`;
  });

  $explanation.innerHTML = html;
  $explanation.className = 'explanation show';
}

function explainOrderOfOps(expr, ans) {
  const steps = [];
  let working = expr;

  // Find and explain parentheses first
  const parenRegex = /\(\s*(\d+)\s*([+−])\s*(\d+)\s*\)/;
  let parenMatch;
  while ((parenMatch = working.match(parenRegex))) {
    const a = parseInt(parenMatch[1]), op = parenMatch[2], b = parseInt(parenMatch[3]);
    const result = op === '+' ? a + b : a - b;
    steps.push(`Solve parentheses first: <b>( ${a} ${op} ${b} ) = ${result}</b>`);
    working = working.replace(parenMatch[0], result);
  }

  // Find and explain × and ÷ (left to right)
  const mulDivRegex = /(\d+)\s*([×÷])\s*(\d+)/;
  let mdMatch;
  while ((mdMatch = working.match(mulDivRegex))) {
    const a = parseInt(mdMatch[1]), op = mdMatch[2], b = parseInt(mdMatch[3]);
    const result = op === '×' ? a * b : a / b;
    const opName = op === '×' ? 'Multiply' : 'Divide';
    steps.push(`${opName}: <b>${a} ${op} ${b} = ${Math.round(result)}</b>`);
    working = working.replace(mdMatch[0], Math.round(result));
  }

  // Find and explain + and − (left to right)
  const addSubRegex = /(\d+)\s*([+−])\s*(\d+)/;
  let asMatch;
  while ((asMatch = working.match(addSubRegex))) {
    const a = parseInt(asMatch[1]), op = asMatch[2], b = parseInt(asMatch[3]);
    const result = op === '+' ? a + b : a - b;
    const opName = op === '+' ? 'Add' : 'Subtract';
    steps.push(`${opName}: <b>${a} ${op} ${b} = ${result}</b>`);
    working = working.replace(asMatch[0], result);
  }

  steps.push(`<div class="exp-result">✅ Answer = ${ans}</div>`);
  return steps;
}

function explainFractionOp(f1, f2, symbol, result) {
  const steps = [];
  const n1 = f1.num, d1 = f1.den, n2 = f2.num, d2 = f2.den;

  if (symbol === '+' || symbol === '−') {
    if (d1 === d2) {
      steps.push(`Denominators are the same (<b>${d1}</b>), so ${symbol === '+' ? 'add' : 'subtract'} the numerators directly`);
      const resN = symbol === '+' ? n1 + n2 : n1 - n2;
      steps.push(`<b>${n1} ${symbol} ${n2} = ${resN}</b>, so we get <b>${resN}/${d1}</b>`);
    } else {
      const lcd = (d1 * d2) / gcd(d1, d2);
      const m1 = lcd / d1, m2 = lcd / d2;
      steps.push(`Find a common denominator: LCD of <b>${d1}</b> and <b>${d2}</b> is <b>${lcd}</b>`);
      steps.push(`Convert: <b>${n1}/${d1}</b> = <b>${n1 * m1}/${lcd}</b> and <b>${n2}/${d2}</b> = <b>${n2 * m2}/${lcd}</b>`);
      const resN = symbol === '+' ? n1 * m1 + n2 * m2 : n1 * m1 - n2 * m2;
      steps.push(`${symbol === '+' ? 'Add' : 'Subtract'} numerators: <b>${n1 * m1} ${symbol} ${n2 * m2} = ${resN}</b>`);
      steps.push(`Result: <b>${resN}/${lcd}</b>`);
    }
  } else if (symbol === '×') {
    steps.push(`Multiply numerators: <b>${n1} × ${n2} = ${n1 * n2}</b>`);
    steps.push(`Multiply denominators: <b>${d1} × ${d2} = ${d1 * d2}</b>`);
    steps.push(`Result: <b>${n1 * n2}/${d1 * d2}</b>`);
  } else if (symbol === '÷') {
    steps.push(`To divide fractions, <b>flip the second fraction</b> and multiply`);
    steps.push(`<b>${n1}/${d1} × ${d2}/${n2}</b>`);
    steps.push(`Numerators: <b>${n1} × ${d2} = ${n1 * d2}</b>`);
    steps.push(`Denominators: <b>${d1} × ${n2} = ${d1 * n2}</b>`);
    steps.push(`Result: <b>${n1 * d2}/${d1 * n2}</b>`);
  }

  // Simplify step
  if (result.den === 1) {
    steps.push(`Simplify: <b>= ${result.num}</b>`);
  } else {
    steps.push(`Simplify: <b>= ${result.num}/${result.den}</b>`);
  }

  const ansStr = result.den === 1 ? `${result.num}` : `${result.num}/${result.den}`;
  steps.push(`<div class="exp-result">✅ Answer = ${ansStr}</div>`);
  return steps;
}

function explainMixedOp(m1, m2, symbol, result) {
  const steps = [];
  const imp1 = m1.whole * m1.den + m1.num;
  const imp2 = m2.whole * m2.den + m2.num;

  steps.push(`Convert to improper fractions:`);
  steps.push(`<b>${m1.whole} ${m1.num}/${m1.den}</b> → <b>${m1.whole}×${m1.den}+${m1.num} = ${imp1}</b> → <b>${imp1}/${m1.den}</b>`);
  steps.push(`<b>${m2.whole} ${m2.num}/${m2.den}</b> → <b>${m2.whole}×${m2.den}+${m2.num} = ${imp2}</b> → <b>${imp2}/${m2.den}</b>`);

  // Now explain the operation
  if (symbol === '+' || symbol === '−') {
    const lcd = (m1.den * m2.den) / gcd(m1.den, m2.den);
    const mul1 = lcd / m1.den, mul2 = lcd / m2.den;
    const adj1 = imp1 * mul1, adj2 = imp2 * mul2;
    steps.push(`Common denominator: <b>${lcd}</b> → <b>${adj1}/${lcd}</b> ${symbol} <b>${adj2}/${lcd}</b>`);
    const resN = symbol === '+' ? adj1 + adj2 : adj1 - adj2;
    steps.push(`${symbol === '+' ? 'Add' : 'Subtract'}: <b>${adj1} ${symbol} ${adj2} = ${resN}</b> → <b>${resN}/${lcd}</b>`);
  } else if (symbol === '×') {
    steps.push(`Multiply: <b>${imp1}×${imp2} = ${imp1 * imp2}</b> over <b>${m1.den}×${m2.den} = ${m1.den * m2.den}</b>`);
  } else if (symbol === '÷') {
    steps.push(`Flip & multiply: <b>${imp1}/${m1.den} × ${m2.den}/${imp2}</b>`);
    steps.push(`= <b>${imp1 * m2.den}/${m1.den * imp2}</b>`);
  }

  // Convert back
  let ansStr = '';
  if (result.whole !== 0) ansStr += result.whole;
  if (result.num !== 0) ansStr += (result.whole ? ' ' : '') + result.num + '/' + result.den;
  if (!ansStr) ansStr = '0';

  steps.push(`Convert to mixed number: <b>${ansStr}</b>`);
  steps.push(`<div class="exp-result">✅ Answer = ${ansStr}</div>`);
  return steps;
}

function updateScoreboard() {
  $correct.textContent = correct;
  $wrong.textContent = wrong;
  $score.textContent = score;
  $streak.textContent = streak + ' 🔥';
}

// ──── Numpad ────
function buildNumpad() {
  const keys = [
    { label: '7', val: '7' }, { label: '8', val: '8' }, { label: '9', val: '9' }, { label: '⌫', val: 'backspace', cls: 'key-danger' },
    { label: '4', val: '4' }, { label: '5', val: '5' }, { label: '6', val: '6' }, { label: 'C', val: 'clear', cls: 'key-danger' },
    { label: '1', val: '1' }, { label: '2', val: '2' }, { label: '3', val: '3' }, { label: '→', val: 'next', cls: 'key-action' },
    { label: '±', val: 'negate' }, { label: '0', val: '0' }, { label: '.', val: '.' }, { label: '✓', val: 'submit', cls: 'key-action' },
  ];

  $numpad.innerHTML = '';
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.textContent = k.label;
    if (k.cls) btn.className = k.cls;
    btn.addEventListener('click', () => handleNumpad(k.val));
    $numpad.appendChild(btn);
  });
}

function handleNumpad(val) {
  if (!focusedInput) return;
  switch (val) {
    case 'backspace':
      focusedInput.value = focusedInput.value.slice(0, -1); break;
    case 'clear':
      focusedInput.value = ''; break;
    case 'negate':
      if (focusedInput.value.startsWith('-')) focusedInput.value = focusedInput.value.slice(1);
      else focusedInput.value = '-' + focusedInput.value;
      break;
    case 'next':
      const inputs = [...document.querySelectorAll('#answer-section input')];
      const idx = inputs.indexOf(focusedInput);
      if (idx < inputs.length - 1) { inputs[idx + 1].focus(); focusedInput = inputs[idx + 1]; }
      break;
    case 'submit':
      checkAnswer(); break;
    default:
      focusedInput.value += val;
  }
  focusedInput.focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT') checkAnswer();
});

// ──── Start ────
newQuestion();
